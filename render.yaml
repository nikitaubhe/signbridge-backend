services:
  - type: web
    name: signbridge-backend
    env: python
    plan: free
    buildCommand: apt-get install -y libgles2 libgl1-mesa-glx libglib2.0-0 && pip install -r requirements.txt
    startCommand: gunicorn flask_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

       